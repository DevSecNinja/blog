---
extends: default

rules:
  # Inline comment spacing varies by author style — not auto-fixable
  comments: disable
  # Long lines are unavoidable with URLs and image paths — not auto-fixable
  line-length: disable
  # Let yamlfmt handle document start markers
  document-start: disable
  # Allow 'on:' as a mapping key in GitHub Actions workflows
  truthy:
    allowed-values:
      - "true"
      - "false"
    check-keys: false
